<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpticRays v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            background-color: #030305;
            margin: 0;
            padding: 0;
            touch-action: none;
            user-select: none;
        }
        .canvas-container { position: relative; width: 100vw; height: 100vh; }
        #glcanvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            filter: blur(1.5px) contrast(1.2) brightness(1.2);
            mix-blend-mode: screen;
        }
        #uicanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; cursor: default; }
        .glass-panel {
            background: rgba(15, 15, 20, 0.65);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            outline: none;
            transition: background 0.2s;
        }
        input[type="range"]:hover { background: rgba(255, 255, 255, 0.25); }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px; height: 16px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
            transition: transform 0.1s, box-shadow 0.1s;
        }
        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
            box-shadow: 0 2px 10px rgba(255,255,255,0.4);
        }
        .shape-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.2s;
        }
        .shape-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: #fff;
            transform: translateY(-1px);
        }
        .badge {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.9);
            font-family: monospace;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 10px;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body class="text-white">
    <div class="canvas-container">
        <canvas id="glcanvas"></canvas>
        <canvas id="uicanvas"></canvas>
    </div>

    <div class="glass-panel fixed top-6 left-6 p-6 rounded-3xl w-[340px] text-sm select-none z-10 flex flex-col gap-6">
        <div class="flex items-center justify-between">
            <h2 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-fuchsia-400">
                Optics<span class="font-light text-white">Ray</span>
            </h2>
            <button id="resetSceneBtn" class="text-[11px] font-semibold tracking-wide text-gray-400 hover:text-white px-3 py-1.5 rounded-full hover:bg-white/10 transition uppercase">
                Сброс
            </button>
        </div>

        <div>
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Добавить объект</h3>
            <div class="grid grid-cols-2 gap-2 text-xs font-medium">
                <button id="addPrismBtn" class="shape-btn py-2.5 rounded-xl flex items-center justify-center gap-2"><span>🔺</span> Призма</button>
                <button id="addRaindropBtn" class="shape-btn py-2.5 rounded-xl flex items-center justify-center gap-2"><span>💧</span> Капля</button>
                <button id="addConvexLensBtn" class="shape-btn py-2.5 rounded-xl flex items-center justify-center gap-2"><span>🔍</span> Выпуклая</button>
                <button id="addConcaveLensBtn" class="shape-btn py-2.5 rounded-xl flex items-center justify-center gap-2"><span>🔎</span> Вогнутая</button>
                <button id="addMirrorBtn" class="shape-btn py-2.5 rounded-xl flex items-center justify-center gap-2"><span>🪞</span> Зеркало</button>
                <button id="addPolygonBtn" class="shape-btn py-2.5 rounded-xl flex items-center justify-center gap-2"><span>🔲</span> Полигон</button>
            </div>
        </div>

        <div class="pt-2">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Источник света</h3>
            <div class="flex bg-black/40 p-1 rounded-lg mb-4 border border-white/5">
                <button id="btn-color-0" class="flex-1 py-1.5 rounded-md text-[11px] font-bold transition bg-white/20 text-white shadow-sm">White</button>
                <button id="btn-color-1" class="flex-1 py-1.5 rounded-md text-[11px] font-bold transition hover:bg-white/5 text-red-400">Red</button>
                <button id="btn-color-2" class="flex-1 py-1.5 rounded-md text-[11px] font-bold transition hover:bg-white/5 text-green-400">Green</button>
                <button id="btn-color-3" class="flex-1 py-1.5 rounded-md text-[11px] font-bold transition hover:bg-white/5 text-blue-400">Blue</button>
            </div>
            <div class="space-y-4">
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs text-gray-300">Угол луча</span>
                        <span id="angleValue" class="badge">0°</span>
                    </div>
                    <input type="range" id="lightAngle" min="-45" max="45" value="0">
                </div>
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs text-gray-300">Толщина пучка</span>
                        <span id="beamValue" class="badge">25</span>
                    </div>
                    <input type="range" id="beamWidth" min="1" max="400" value="25">
                </div>
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs text-yellow-300/80 font-medium">☀️ Яркость (Интенсивность)</span>
                        <span id="intensityVal" class="badge !bg-yellow-400/20 !text-yellow-200">x1.0</span>
                    </div>
                    <input type="range" id="uiIntensity" min="10" max="500" value="100">
                </div>
            </div>
        </div>

        <div class="pt-2 border-t border-white/5">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-3">Параметры среды</h3>
            <div class="space-y-4">
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs text-fuchsia-300/80">Глобальная дисперсия</span>
                        <span id="dispValue" class="badge !bg-fuchsia-500/20 !text-fuchsia-200">x1.0</span>
                    </div>
                    <input type="range" id="uiDispersion" min="0" max="100" value="30">
                </div>
                <div>
                    <div class="flex justify-between items-end mb-2">
                        <span class="text-xs text-cyan-300/80">Коэфф. преломления воздуха (n)</span>
                        <span id="envNValue" class="badge !bg-cyan-500/20 !text-cyan-200">1.00</span>
                    </div>
                    <input type="range" id="uiEnvN" min="100" max="250" value="100">
                </div>
            </div>
        </div>
    </div>

    <div id="elementPanel" class="glass-panel fixed top-6 right-6 p-6 rounded-3xl w-[280px] text-sm select-none z-10 transition-all transform translate-x-10 opacity-0 pointer-events-none">
        <div class="flex justify-between items-center mb-5 pb-3 border-b border-white/10">
            <h3 class="text-[13px] font-bold text-white tracking-wide">Свойства объекта</h3>
            <button id="deleteSelectedBtn" class="text-red-400 hover:text-red-300 transition bg-red-500/10 hover:bg-red-500/20 p-1.5 rounded-lg" title="Удалить (Del)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            </button>
        </div>
        <div id="elementControls" class="space-y-4"></div>
    </div>

<script type="x-shader/x-vertex" id="vertex-shader">#version 300 es
        precision highp float;

        uniform vec2 u_resolution;
        uniform vec2 u_lightPos;
        uniform vec2 u_lightDir;
        uniform float u_beamWidth;
        uniform float u_dispersion;
        uniform float u_envN;
        uniform float u_baseAlpha; 
        uniform int u_colorType; 
        
        uniform int u_numSegments;
        // ИСПРАВЛЕНИЕ: Увеличен лимит для невероятной гладкости фигур (128 сегментов линзы)
        uniform vec4 u_segments[1000]; 
        uniform vec2 u_segProps[1000];  

        uniform int u_numCircles;
        uniform vec3 u_circles[10];    
        uniform vec2 u_circProps[10];  

        out vec3 v_color;
        out float v_alpha;

        // Качественный хэш для белого света
        float hash12(vec2 p) {
            vec3 p3  = fract(vec3(p.xyx) * .1031);
            p3 += dot(p3, p3.yzx + 33.33);
            return fract((p3.x + p3.y) * p3.z);
        }

        vec3 spectralColor(float x) {
            float r = exp(-pow((x - 0.8) / 0.25, 2.0));
            float g = exp(-pow((x - 0.5) / 0.25, 2.0));
            float b = exp(-pow((x - 0.2) / 0.25, 2.0));
            return vec3(r, g, b);
        }

        float getIOR(float baseN, float wl, float disp) {
            if (baseN <= 1.0) return baseN;
            return baseN + (0.5 - wl) * disp;
        }

        void checkSegment(vec2 ro, vec2 rd, vec4 seg, float n, float type, inout float minT, inout vec2 bestNormal, inout float bestN, inout float bestType) {
            vec2 a = seg.xy; vec2 b = seg.zw;
            vec2 v = b - a; vec2 w = ro - a;
            float denom = rd.x * v.y - rd.y * v.x;
            if(abs(denom) < 1e-6) return;
            float t = (v.x * w.y - v.y * w.x) / denom;
            float s = (rd.x * w.y - rd.y * w.x) / denom;
            
            if(t > 0.1 && t < minT && s >= 0.0 && s <= 1.0) {
                minT = t; 
                bestNormal = normalize(vec2(v.y, -v.x)); 
                bestN = n; bestType = type;
            }
        }

        void checkCircle(vec2 ro, vec2 rd, vec3 circ, float n, float type, inout float minT, inout vec2 bestNormal, inout float bestN, inout float bestType) {
            vec2 c = circ.xy; float r = circ.z; vec2 oc = ro - c;
            float a = dot(rd, rd); float b = 2.0 * dot(oc, rd); float c_val = dot(oc, oc) - r*r;
            float disc = b*b - 4.0*a*c_val;
            if(disc >= 0.0) {
                float sqrtD = sqrt(disc); float t1 = (-b - sqrtD)/(2.0*a); float t2 = (-b + sqrtD)/(2.0*a);
                float t = t1 > 0.1 ? t1 : (t2 > 0.1 ? t2 : -1.0);
                if(t > 0.1 && t < minT) {
                    minT = t; bestNormal = normalize((ro + rd*t) - c); bestN = n; bestType = type;
                }
            }
        }

        void main() {
            int id = gl_InstanceID;
            int step = gl_VertexID;
            vec2 seed = vec2(float(id), 1.337);

            float rndY = hash12(seed + 1.0);
            float wl = hash12(seed + 3.0); 
            
            if(u_colorType == 1) wl = 0.8;       
            else if(u_colorType == 2) wl = 0.5;  
            else if(u_colorType == 3) wl = 0.2; 

            vec3 color = spectralColor(wl);

            vec2 perp = vec2(-u_lightDir.y, u_lightDir.x);
            vec2 ro = u_lightPos + perp * (rndY - 0.5) * u_beamWidth;
            vec2 rd = u_lightDir;
            
            float currentN = u_envN;
            float intensity = 1.0;

            for(int i = 0; i < 24; i++) {
                if(i >= step) break; 

                float minT = 99999.0; vec2 normal = vec2(0.0); float nextN = 1.0; float hitType = 0.0;

                // Увеличен цикл до 1000 для детальных линз
                for(int j=0; j<1000; j++) {
                    if(j >= u_numSegments) break;
                    checkSegment(ro, rd, u_segments[j], u_segProps[j].x, u_segProps[j].y, minT, normal, nextN, hitType);
                }
                
                for(int j=0; j<10; j++) {
                    if(j >= u_numCircles) break;
                    checkCircle(ro, rd, u_circles[j], u_circProps[j].x, u_circProps[j].y, minT, normal, nextN, hitType);
                }

                if(minT > 9999.0) { ro = ro + rd * 2500.0; break; }
                vec2 hitPos = ro + rd * minT;

                if(hitType == 2.0) { 
                    if(dot(rd, normal) > 0.0) normal = -normal;
                    rd = reflect(rd, normal);
                    intensity *= 0.9; 
                } else { 
                    bool entering = dot(rd, normal) < 0.0;
                    if(!entering) normal = -normal;

                    float n1 = getIOR(currentN, wl, u_dispersion);
                    float n2 = getIOR(entering ? nextN : u_envN, wl, u_dispersion);

                    float ratio = n1 / n2; float cosI = -dot(rd, normal); float sinT2 = ratio * ratio * (1.0 - cosI * cosI);

                    if(sinT2 > 1.0) {
                        rd = reflect(rd, normal); 
                    } else {
                        float cosT = sqrt(1.0 - sinT2);
                        float r0 = pow((n1 - n2) / (n1 + n2), 2.0);
                        float R = r0 + (1.0 - r0) * pow(1.0 - cosI, 5.0);
                        
                        seed += hitPos * 0.01;
                        if(hash12(seed + float(i*13)) < R) rd = reflect(rd, normal); 
                        else { 
                            rd = normalize(ratio * rd + (ratio * cosI - cosT) * normal); 
                            currentN = entering ? nextN : u_envN; 
                        }
                    }
                }
                ro = hitPos;
            }

            vec2 clipPos = (ro / u_resolution) * 2.0 - 1.0;
            clipPos.y = -clipPos.y; 
            gl_Position = vec4(clipPos, 0.0, 1.0);
            v_color = color;
            v_alpha = intensity * u_baseAlpha; 
        }
    </script>

    <!-- ФРАГМЕНТНЫЙ ШЕЙДЕР -->
    <script type="x-shader/x-fragment" id="fragment-shader">#version 300 es
        precision highp float;
        in vec3 v_color;
        in float v_alpha;
        out vec4 fragColor;
        void main() { 
            fragColor = vec4(v_color * v_alpha, 1.0); 
        }
    </script>

    
    <script type="module" src="./app.js"></script>
</body>
</html>
